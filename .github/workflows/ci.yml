name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    name: Bash checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Bash syntax
        run: bash -n setup-tor-guard-relay.sh

      - name: ShellCheck
        run: shellcheck -S warning -e SC2034,SC2178 setup-tor-guard-relay.sh tests/test-functions.bash

      - name: Function tests
        run: bash tests/test-functions.bash

      - name: Help and version smoke tests
        run: |
          ./setup-tor-guard-relay.sh --help >/tmp/help.txt
          ./setup-tor-guard-relay.sh --version | grep -Fx 'setup-tor-guard-relay.sh 1.0.0-beta.1'
          grep -Fq -- '--dry-run' /tmp/help.txt
